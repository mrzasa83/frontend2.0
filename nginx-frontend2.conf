# /etc/nginx/conf.d/frontend2.conf
#
# Since the Next.js app uses basePath: '/frontend2.0', it already expects
# requests to arrive with that prefix.  nginx simply proxies the full
# path through — no rewriting needed.
#
# The app's basePath means:
#   • All pages are served at /frontend2.0/...
#   • Static assets at /frontend2.0/_next/...
#   • API routes at /frontend2.0/api/...
#
# This is the simplest approach and avoids redirect-URL mismatches.

upstream frontend2_upstream {
    server 127.0.0.1:3002;          # matches docker-compose port mapping
}

server {
    listen 80;
    server_name your-server-hostname;

    # ── frontend2.0 ────────────────────────────────────────────────────
    location /frontend2.0/ {
        proxy_pass http://frontend2_upstream/frontend2.0/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for long-running API calls (folder scans, etc.)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Redirect bare /frontend2.0 (no trailing slash) to /frontend2.0/
    location = /frontend2.0 {
        return 301 /frontend2.0/;
    }

    # ── Other apps on the same host ────────────────────────────────────
    # location /frontNpi/ { ... }
    # location /frontVue/ { ... }
}
